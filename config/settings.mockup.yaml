# 调试模式配置 — 所有接口使用 MockupClient，无需真实 API
# 使用方式: cp config/settings.mockup.yaml config/settings.yaml

server:
  host: 0.0.0.0
  port: 8000
  log_level: debug
  default_max_tokens: 4096

# mappings: 使用内置默认映射，无需配置

routes:
  completions:
    path: /v1/chat/completions
    base_url: http://localhost
    provider: mockup
    from: messages

  responses:
    path: /v1/responses
    base_url: http://localhost
    provider: mockup
    from: messages

  messages:
    path: /v1/messages
    base_url: http://localhost
    provider: mockup
    from: completions
