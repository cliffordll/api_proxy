# 配置模板
# 复制为 settings.yaml 后按需修改: cp config/settings.example.yaml config/settings.yaml

# ── 服务配置 ──────────────────────────────────────────────────

server:
  host: 0.0.0.0
  port: 8000
  log_level: info                    # debug / info / warning / error
  default_max_tokens: 4096           # 请求未指定 max_tokens 时的默认值

# ── 模型映射 ──────────────────────────────────────────────────

mappings:
  openai_to_claude:
    gpt-4o: claude-sonnet-4-6-20250514
    gpt-4-turbo: claude-sonnet-4-6-20250514
    gpt-4: claude-opus-4-6-20250514
    gpt-3.5-turbo: claude-haiku-4-5-20251001
  claude_to_openai:
    claude-opus-4-6-20250514: gpt-4
    claude-sonnet-4-6-20250514: gpt-4o
    claude-haiku-4-5-20251001: gpt-3.5-turbo

# ── 路由配置 ──────────────────────────────────────────────────
#
# 字段说明:
#   path:      本代理暴露的路由路径
#   base_url:  上游 API 地址
#              - claude provider:  不带 /v1（如 https://api.anthropic.com）
#              - openai/ollama:    需带 /v1（如 https://api.openai.com/v1、http://localhost:11434/v1）
#              - httpx:            填完整基础地址，由 interface 决定路径
#   provider:  客户端类型 — claude / openai / ollama / httpx / mockup
#   from:      上游接口格式 — messages / completions / responses
#              自动推导转换器：{路由名}_from_{from值}
#              不配置则自动透传（上游格式 = 路由名，不做转换）

routes:
  completions:
    path: /v1/chat/completions
    base_url: https://api.anthropic.com
    provider: claude
    from: messages

  responses:
    path: /v1/responses
    base_url: https://api.anthropic.com
    provider: claude
    from: messages

  messages:
    path: /v1/messages
    base_url: https://api.openai.com/v1
    provider: openai
    from: completions

# 透传示例（不配 from，上游格式和路由名相同，不做转换）:
#  messages:
#    path: /v1/messages
#    base_url: http://localhost:11434/v1
#    provider: httpx

# ── 客户端配置 ────────────────────────────────────────────────

client:
  base_url: http://localhost:8000
  route: messages
  model: claude-sonnet-4-6-20250514
  # api_key: xxx
  stream: true
